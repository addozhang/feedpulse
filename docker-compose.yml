services:
  feedpulse:
    build: .
    container_name: feedpulse
    restart: unless-stopped
    environment:
      - FEEDPULSE_TELEGRAM_BOT_TOKEN=${FEEDPULSE_TELEGRAM_BOT_TOKEN}
      - FEEDPULSE_POLL_INTERVAL_MINUTES=${FEEDPULSE_POLL_INTERVAL_MINUTES:-10}
      - FEEDPULSE_INITIAL_FETCH_LIMIT=${FEEDPULSE_INITIAL_FETCH_LIMIT:-5}
      - FEEDPULSE_LANGUAGE=${FEEDPULSE_LANGUAGE:-en}
      - FEEDPULSE_API_ENABLED=${FEEDPULSE_API_ENABLED:-true}
      - FEEDPULSE_API_PORT=${FEEDPULSE_API_PORT:-8000}
    ports:
      - "${FEEDPULSE_API_PORT:-8000}:${FEEDPULSE_API_PORT:-8000}"
    volumes:
      - feedpulse-data:/app/data

volumes:
  feedpulse-data:
